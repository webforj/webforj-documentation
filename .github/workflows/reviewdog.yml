name: reviewdog
on:
  pull_request:
    paths-ignore:
      - 'docs/blog/**'
jobs:
  vale:
    name: runner / vale
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v3
      - uses: errata-ai/vale-action@reviewdog
        with:
          fail_on_error: true
          # github-pr-check, github-pr-review, github-check
          reporter: github-pr-review
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  check-indentation:
    name: runner / check-indentation
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Check code block indentation
        run: node scripts/check-indentation.mjs
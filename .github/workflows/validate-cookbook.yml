name: Validate Cookbook Recipes

on:
  pull_request:
    paths:
      - 'docs/cookbook/**'

jobs:
  validate:
    name: Validate cookbook frontmatter
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Validate changed cookbook recipes
        run: node tools/validate-cookbook.mjs --changed
        working-directory: docs
